name: Clean, Unzip and Flatten to Root

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest

    steps:
      # 在这里通过 token 参数传入你的 PAT，接下来的所有 git 提交就拥有修改 workflow 的特权了
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets::MY_WORKFLOW_TOKEN }}

      - name: Clean repository root
        run: |
          echo "=== 开始清理根目录 ==="
          find . -maxdepth 1 ! -name "." \
                           ! -name ".git" \
                           ! -name ".github" \
                           ! -iname "readme*" \
                           ! -name "*.zip" \
                           -exec rm -rf {} +
          echo "清理完成，当前保留的文件/目录："
          ls -A

      - name: Unzip file to root
        run: |
          echo "=== 开始寻找并解压 ZIP ==="
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" -print -quit)
          
          if [ -n "$ZIP_FILE" ]; then
            echo "找到压缩包: $ZIP_FILE ，开始解压..."
            unzip -o "$ZIP_FILE" -d .
          else
            echo "错误：在根目录下没有找到任何 .zip 文件！"
            exit 1
          fi

      - name: Flatten single subdirectory
        run: |
          echo "=== 开始检查解压目录结构 ==="
          ITEMS=$(find . -maxdepth 1 ! -name "." ! -name ".git" ! -name ".github" ! -name "*.zip" -print)
          ITEM_COUNT=$(echo "$ITEMS" | sed '/^$/d' | wc -l)
          
          if [ "$ITEM_COUNT" -eq 1 ] && [ -d "$ITEMS" ]; then
            SUB_DIR="$ITEMS"
            echo "检测到解压后只有一个文件夹: $SUB_DIR"
            
            if [ -d "$SUB_DIR/.github" ]; then
              echo "警告：子文件夹中包含 .github 目录，开始执行合并与覆盖..."
              cp -rf "$SUB_DIR/.github/"* .github/
              rm -rf "$SUB_DIR/.github"
            fi

            echo "开始将该文件夹内的所有剩余内容移到根目录..."
            shopt -s dotglob
            mv "$SUB_DIR"/* .
            shopt -u dotglob
            
            rmdir "$SUB_DIR"
            echo "扁平化移动完成，已删除空壳文件夹。"
          else
            echo "无需扁平化处理。"
          fi

      - name: Commit and Push changes
        run: |
          echo "=== 开始提交代码 ==="
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .
          if git diff --staged --quiet; then
            echo "没有检测到任何文件变化，跳过提交。"
          else
            git commit -m "chore: clean, auto-unzip and flatten repository [skip ci]"
            git push
          fi
